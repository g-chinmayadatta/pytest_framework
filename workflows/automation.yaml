name: Run Automation Tests

on:
  push:
    branches: [chinmaya_automation]
  pull_request:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API Tests
        run: pytest -m api

      - name: Run negative tests (optional)
        run: pytest -m api_negative || true

      - name: Run UI Tests
        run: pytest -m ui